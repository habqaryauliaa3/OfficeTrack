<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - OfficeTrack</title>

    <link rel="icon"
          type="image/png"
          href="{{ url_for('static', filename='icons/logo.png') }}">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <div class="login-box">

        <h1>OfficeTrack</h1>

        <h2>Login</h2>

        <form method="POST">

            <input
                type="text"
                name="username"
                placeholder="Username"
                required
            >

            <input
                type="password"
                name="password"
                placeholder="Password"
                required
            >

            <button type="submit">
                Login
            </button>

        </form>

        <p>
            Belum punya akun?
            <a href="/register">Register</a>
        </p>

    </div>

    <script
        defer
        src="{{ url_for('static', filename='js/darkmode.js') }}">
    </script>
    
</body>
</html>
