<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Riwayat Aktivitas</title>

    <link rel="icon"
          type="image/png"
          href="{{ url_for('static', filename='icons/logo.png') }}">

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <div class="container">

        <div class="navbar">

            <div class="navbar-logo">
                OfficeTrack
            </div>

            <div class="navbar-menu">
                <a href="/dashboard">Dashboard</a>
                <a href="/finance">Finance</a>
                <a href="/logs">Logs</a>
                <a href="/logout">Logout</a>

                <button
                    id="theme-toggle"
                    type="button">
                    🌙
                </button>
            </div>
            
        </div>
        
        <h1>Riwayat Aktivitas</h1>

        <hr>

        {% if logs %}

            {% for log in logs %}
            
                <div class="card log-card">

                    <div class="card-body">
                        <p>
                            {{ log[3] }}
                        </p>

                        <p>
                            {{ log[2] }}
                        </p>

                    </div>
                    
                </div>

            {% endfor %}

        {% else %}

            <p>
                Belum ada aktivitas
            </p>

        {% endif %}

        <a href="/dashboard">
            Kembali ke Dashboard
        </a>

    </div>

    <script
        defer
        src="{{ url_for('static', filename='js/darkmode.js') }}">
    </script>
    
</body>
</html>
